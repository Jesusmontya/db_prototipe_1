<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - PsicoGestor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            background-color: #2c3e50; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
        }
        .login-card {
            max-width: 400px;
            width: 90%;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .brand-icon {
            font-size: 3.5rem;
            color: #3498db;
        }
    </style>
</head>
<body>

    <div class="card border-0 p-4 login-card bg-white">
        <div class="card-body text-center">
            
            <div class="mb-4">
                <i class="fa-solid fa-brain brand-icon mb-2"></i>
                <h3 class="fw-bold text-dark mb-0">PsicoGestor</h3>
                <p class="text-muted small mt-1">Acceso seguro al expediente clínico</p>
            </div>

            <div id="alert-container"></div>

            <div style="display: none;" id="jinja-data">
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <span class="flash-msg" data-category="{{ category }}" data-message="{{ message }}"></span>
                    {% endfor %}
                  {% endif %}
                {% endwith %}
            </div>

            <form action="/login" method="POST">
                <div class="mb-4 text-start">
                    <label class="form-label fw-bold text-secondary"><i class="fa-solid fa-lock me-1"></i> Contraseña Maestra</label>
                    <input type="password" name="password" class="form-control form-control-lg bg-light" placeholder="••••••••••••" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">
                    Ingresar <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
                </button>
            </form>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const mensajes = document.querySelectorAll('.flash-msg');
            const contenedor = document.getElementById('alert-container');
            
            mensajes.forEach(msg => {
                const category = msg.getAttribute('data-category');
                const text = msg.getAttribute('data-message');
                
                // Evitamos usar las llaves juntas para que Jinja2 no marque error
                const llaveFlask = '{' + '{'; 
                
                if (text && !text.includes(llaveFlask)) {
                    const tipo = category === 'error' ? 'danger' : 'success';
                    contenedor.innerHTML += `
                        <div class="alert alert-${tipo} alert-dismissible fade show text-start py-2" role="alert">
                            <i class="fa-solid fa-circle-exclamation me-1"></i> ${text}
                            <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert" aria-label="Close" style="padding: 0.8rem;"></button>
                        </div>
                    `;
                }
            });
        });
    </script>
</body>
</html>
